name: Tests (PyTest)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/pytest.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/pytest.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (Ubuntu)
      run: |
        sudo apt-get update

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[all]"
        pip install -e ".[dev]"

    - name: Install SmartPool (public)
      run: |
        pip install "git+https://github.com/arioch3131/smartpool.git@2.0.0"

    - name: Run tests
      run: |
        pytest tests/unit/ tests/performance/

    - name: Upload coverage to Codecov
      uses: actions/upload-artifact@v4
      with:
        name: "coverage-${{ matrix.os }}-py${{ matrix.python-version }}"
        path: coverage.xml
