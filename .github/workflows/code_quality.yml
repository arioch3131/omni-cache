name: Code Quality

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'pyproject.toml'
      - '.github/workflows/code_quality.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'pyproject.toml'
      - '.github/workflows/code_quality.yml'

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install -e ".[all]"

    - name: Install SmartPool (public)
      run: |
        pip install "git+https://github.com/arioch3131/smartpool.git@2.0.0"

    - name: Run Ruff format (formatting check)
      run: |
        ruff format --check src/ tests/ examples/

    - name: Run Ruff check (linting + import sorting)
      run: |
        ruff check src/ tests/ examples/

    - name: Run mypy (type checking)
      run: |
        mypy src/
